name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract tag info
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            🚀 Stupid Radar Chart ${{ steps.meta.outputs.version }}

            **Docker Image**
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ```
            ```
            docker run -p 3000:3000 ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ```

            **Quick Start**
            ```bash
            docker pull ghcr.io/${{ github.repository }}:latest
            docker run -p 3000:3000 ghcr.io/${{ github.repository }}:latest
            ```

            ---
            :whale: Published to GitHub Container Registry (`ghcr.io`).
