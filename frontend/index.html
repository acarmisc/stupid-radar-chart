<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Chart - Enterprise Mod 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
    
    :root {
      --enterprise-bg: #fdfdff; /* Background */
      --enterprise-fg: #0d0d12; /* Foreground */
      --enterprise-primary: #0F62FE; /* Primary */
      --enterprise-pfg: #F3F4F6; /* Primary Foreground */
      --enterprise-secondary: #edebff; /* Secondary */
      --enterprise-sfg: #483d8b; /* Secondary Foreground */
      --enterprise-accent: #f0f2ff; /* Accent */
      --enterprise-afg: #6b46ff; /* Accent Foreground */
      --enterprise-card: #ffffff; /* Card */
      --enterprise-cfg: #0d0d12; /* Card Foreground */
      --enterprise-popover: #ffffff; /* Popover */
      --enterprise-popcfg: #0d0d12; /* Popover Foreground */
      --enterprise-muted: #f1f1f8; /* Muted */
      --enterprise-mfg: #62627a; /* Muted Foreground */
      --enterprise-border: #e2e2ee; /* Border */
      --enterprise-input: #e2e2ee; /* Input */
      --enterprise-ring: #0F62FE; /* Ring */
      --enterprise-destructive: #ef4444; /* Destructive */
      --enterprise-dfg: #f8fafc; /* Destructive Foreground */
      --enterprise-chart1: #6b46ff;
      --enterprise-chart2: #4a72ff;
      --enterprise-chart3: #528cff;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body {
      background-color: var(--enterprise-bg);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
    }
    
    .enterprise-header {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--enterprise-fg);
      text-align: center;
      margin-bottom: 10px;
    }
    
    .enterprise-subtitle {
      font-size: 1rem;
      color: var(--enterprise-mfg);
      text-align: center;
      margin-bottom: 40px;
    }
    
    .enterprise-panel {
      background: var(--enterprise-card);
      border: 1px solid var(--enterprise-border);
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      padding: 30px;
    }
    
    .enterprise-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--enterprise-fg);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--enterprise-border);
    }
    
    .enterprise-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--enterprise-fg);
      margin-bottom: 8px;
    }
    
    .enterprise-input {
      width: 100%;
      background: var(--enterprise-card);
      border: 1px solid var(--enterprise-border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      color: var(--enterprise-fg);
      transition: all 0.2s;
    }
    
    .enterprise-input:focus {
      outline: none;
      border-color: var(--enterprise-ring);
      box-shadow: 0 0 0 3px rgba(15, 98, 254, 0.1);
    }
    
    .enterprise-select {
      width: 100%;
      background: var(--enterprise-card);
      border: 1px solid var(--enterprise-border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      color: var(--enterprise-fg);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .enterprise-select:focus {
      outline: none;
      border-color: var(--enterprise-ring);
      box-shadow: 0 0 0 3px rgba(15, 98, 254, 0.1);
    }
    
    .enterprise-slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }
    
    .enterprise-slider-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--enterprise-fg);
    }
    
    .enterprise-slider-value {
      background: var(--enterprise-secondary);
      color: var(--enterprise-sfg);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    
    .enterprise-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--enterprise-border);
      border-radius: 2px;
      margin-top: 8px;
    }
    
    .enterprise-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--enterprise-primary);
      border: 2px solid var(--enterprise-card);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.1s;
    }
    
    .enterprise-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    
    .enterprise-btn {
      background: var(--enterprise-primary);
      color: var(--enterprise-pfg);
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .enterprise-btn:hover {
      background: #1a70ff;
    }
    
    .enterprise-btn:active {
      transform: translateY(1px);
    }
    
    .enterprise-btn-secondary {
      background: var(--enterprise-muted);
      color: var(--enterprise-mfg);
    }
    
    .enterprise-btn-secondary:hover {
      background: #e8e8f0;
    }
    
    .enterprise-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .enterprise-radar {
      background: var(--enterprise-card);
      border: 1px solid var(--enterprise-border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      min-height: 400px;
    }
    
    .enterprise-radar canvas {
      max-height: 350px !important;
      width: 100% !important;
    }
    
    .enterprise-metadata {
      background: var(--enterprise-muted);
      border: 1px solid var(--enterprise-border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
    }
    
    .enterprise-metadata-item {
      padding: 8px 12px;
      background: var(--enterprise-card);
      border: 1px solid var(--enterprise-border);
      border-radius: 6px;
      margin: 8px 0;
      font-size: 0.875rem;
      color: var(--enterprise-fg);
    }
    
    .enterprise-metadata-item strong {
      color: var(--enterprise-fg);
      font-weight: 600;
    }
    
    .enterprise-footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.875rem;
      color: var(--enterprise-mfg);
      padding: 16px;
      background: var(--enterprise-muted);
      border-radius: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    
    @media (max-width: 768px) {
      .enterprise-grid {
        grid-template-columns: 1fr;
      }
      
      .enterprise-header {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="enterprise-header">📊 Radar Chart</div>
  <div class="enterprise-subtitle">Generate transparent radar charts from your KPIs</div>

  <div class="enterprise-grid">
    <!-- Form Panel -->
    <div class="enterprise-panel">
      <h2 class="enterprise-title">Configuration</h2>
      
      <div class="space-y-4">
        <div>
          <label class="enterprise-label">Project Title</label>
          <input type="text" id="title" value="FinOps MVP Dashboard" class="enterprise-input">
        </div>

        <div>
          <label class="enterprise-label">Author</label>
          <input type="text" id="author" value="Andrea" class="enterprise-input">
        </div>

        <div>
          <label class="enterprise-label">Deliverable Type</label>
          <select id="deliverable_type" class="enterprise-select">
            <option value="slideshow">Slide Deck</option>
            <option value="code" selected>Code</option>
            <option value="workbook">Workbook</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- KPI Sliders -->
        <div>
          <h3 class="enterprise-title" style="font-size: 1.25rem; margin-top: 30px; margin-bottom: 20px; border-bottom: none;">KPIs (1-100)</h3>
          
          <div class="enterprise-slider-label">
            <span class="enterprise-slider-name">author</span>
            <span id="val-author" class="enterprise-slider-value">75</span>
          </div>
          <input type="range" id="kpi-author" min="1" max="100" value="75" oninput="updateValue(this.id, 'val-author')">
          <div style="height: 24px;"></div>

          <div class="enterprise-slider-label">
            <span class="enterprise-slider-name">ai</span>
            <span id="val-ai" class="enterprise-slider-value">85</span>
          </div>
          <input type="range" id="kpi-ai" min="1" max="100" value="85" oninput="updateValue(this.id, 'val-ai')">
          <div style="height: 24px;"></div>

          <div class="enterprise-slider-label">
            <span class="enterprise-slider-name">team</span>
            <span id="val-team" class="enterprise-slider-value">70</span>
          </div>
          <input type="range" id="kpi-team" min="1" max="100" value="70" oninput="updateValue(this.id, 'val-team')">
          <div style="height: 24px;"></div>

          <div class="enterprise-slider-label">
            <span class="enterprise-slider-name">research</span>
            <span id="val-research" class="enterprise-slider-value">65</span>
          </div>
          <input type="range" id="kpi-research" min="1" max="100" value="65" oninput="updateValue(this.id, 'val-research')">
          <div style="height: 24px;"></div>

          <div class="enterprise-slider-label">
            <span class="enterprise-slider-name">unspecified</span>
            <span id="val-unspecified" class="enterprise-slider-value">60</span>
          </div>
          <input type="range" id="kpi-unspecified" min="1" max="100" value="60" oninput="updateValue(this.id, 'val-unspecified')">
        </div>

        <button onclick="generateChart()" class="enterprise-btn">Generate Chart</button>
      </div>
    </div>

    <!-- Chart Panel -->
    <div class="enterprise-panel">
      <h2 class="enterprise-title">Preview</h2>
      
      <div class="enterprise-radar">
        <canvas id="radarChart"></canvas>
        <div class="absolute bottom-4 right-4 space-x-2">
          <button onclick="exportPNG()" class="enterprise-btn enterprise-btn-secondary">Export PNG</button>
        </div>
      </div>

      <div class="enterprise-metadata">
        <div class="enterprise-title" style="font-size: 1rem; padding: 0; border: none; margin-bottom: 12px;">Metadata</div>
        <div id="metadata"></div>
      </div>
    </div>
  </div>

  <div class="enterprise-footer">
    Enterprise Mod 2 Theme - Corporate, Professional, Elegant
  </div>

  <script>
    let radarChartInstance = null;

    function updateValue(inputId, spanId) {
      const inputValue = document.getElementById(inputId).value;
      document.getElementById(spanId).textContent = inputValue;
    }

    function collectKPIs() {
      return {
        author: parseInt(document.getElementById('kpi-author').value),
        ai: parseInt(document.getElementById('kpi-ai').value),
        team: parseInt(document.getElementById('kpi-team').value),
        research: parseInt(document.getElementById('kpi-research').value),
        unspecified: parseInt(document.getElementById('kpi-unspecified').value)
      };
    }

    function generateChart() {
      const kpis = collectKPIs();
      const labels = Object.keys(kpis);
      const values = Object.values(kpis);
      
      const title = document.getElementById('title').value;
      const author = document.getElementById('author').value;

      // Update metadata
      const metadataEl = document.getElementById('metadata');
      metadataEl.innerHTML = `
        <div class="enterprise-metadata-item"><strong>Title:</strong> ${title}</div>
        <div class="enterprise-metadata-item"><strong>Author:</strong> ${author}</div>
        <div class="enterprise-metadata-item"><strong>Deliverable:</strong> ${document.getElementById('deliverable_type').value}</div>
      `;

      // Destroy previous chart if exists
      if (radarChartInstance) {
        radarChartInstance.destroy();
      }

      // Create new chart with transparent background
      const ctx = document.getElementById('radarChart').getContext('2d');
      radarChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: labels.map(l => l.charAt(0).toUpperCase() + l.slice(1)),
          datasets: [{
            label: 'KPI Values',
            data: values,
            backgroundColor: 'rgba(15, 98, 254, 0.2)',
            borderColor: '#0F62FE',
            borderWidth: 2,
            pointBackgroundColor: '#6b46ff',
            pointBorderColor: '#0F62FE',
            pointBorderWidth: 2,
            pointRadius: 5
          }]
        },
        options: {
          maintainAspectRatio: false,
          elements: {
            line: { tension: 0.4 }
          },
          scales: {
            r: {
              min: 0,
              max: 100,
              grid: {
                color: 'rgba(0, 0, 0, 0.05)'
              },
              angleLines: {
                color: 'rgba(0, 0, 0, 0.05)'
              },
              pointLabels: {
                color: '#0d0d12',
                font: { size: 13, weight: '500' }
              },
              ticks: { showLabelBackdrop: false, color: '#62627a' }
            }
          },
          plugins: {
            legend: {
              labels: {
                color: '#0d0d12',
                font: { family: 'Inter', weight: '500' }
              }
            },
            title: {
              display: true,
              text: title + '\nby ' + author,
              color: '#0d0d12',
              font: { family: 'Inter', size: 16, weight: '700' }
            }
          }
        }
      });
    }

    function exportPNG() {
      const canvas = document.getElementById('radarChart');
      const link = document.createElement('a');
      link.download = 'radar-' + document.getElementById('author').value.replace(/\s+/g, '_') + '-' + Date.now() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    window.addEventListener('load', generateChart);
  </script>
</body>
</html>
